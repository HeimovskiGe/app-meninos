<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste ROTINACRAFT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #87CEEB, #98D8E8);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .test-title {
            color: #FFD700;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            border-left: 5px solid #FFD700;
        }
        .test-button {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        .test-button:hover {
            transform: translateY(-2px);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .minecraft-texture {
            width: 64px;
            height: 64px;
            border: 2px solid #333;
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="test-title">🧱 ROTINACRAFT - Teste de Funcionamento</h1>
        
        <div class="test-section">
            <h2>🔍 Status do Sistema</h2>
            <div id="system-status" class="status">Verificando...</div>
        </div>

        <div class="test-section">
            <h2>🎮 Teste de Funcionalidades</h2>
            <button class="test-button" onclick="testAvatars()">Testar Avatares</button>
            <button class="test-button" onclick="testTextures()">Testar Texturas</button>
            <button class="test-button" onclick="testJavaScript()">Testar JavaScript</button>
            <button class="test-button" onclick="testLocalStorage()">Testar LocalStorage</button>
        </div>

        <div class="test-section">
            <h2>📊 Resultados dos Testes</h2>
            <div id="test-results"></div>
        </div>

        <div class="test-section">
            <h2>🧱 Texturas do Minecraft</h2>
            <div id="texture-test">
                <img src="CSS-Minecraft-main/assets/stone.png" alt="Stone" class="minecraft-texture">
                <img src="CSS-Minecraft-main/assets/oak_planks.png" alt="Oak Planks" class="minecraft-texture">
                <img src="CSS-Minecraft-main/assets/grass_side_carried.png" alt="Grass" class="minecraft-texture">
                <img src="CSS-Minecraft-main/assets/glass.png" alt="Glass" class="minecraft-texture">
            </div>
        </div>

        <div class="test-section">
            <h2>👥 Teste de Avatares</h2>
            <div id="avatar-test">
                <img src="minecraft-emoji-e3560/assets/minecraft/textures/font/custom/stive70.png" alt="Steve 70" class="minecraft-texture">
                <img src="minecraft-emoji-e3560/assets/minecraft/textures/font/custom/alex70.png" alt="Alex 70" class="minecraft-texture">
                <img src="minecraft-emoji-e3560/assets/minecraft/textures/font/custom/warden.png" alt="Warden" class="minecraft-texture">
            </div>
        </div>
    </div>

    <script>
        // Função para verificar status do sistema
        function checkSystemStatus() {
            const statusDiv = document.getElementById('system-status');
            
            try {
                // Verificar se o JavaScript está funcionando
                if (typeof window !== 'undefined') {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Sistema funcionando! JavaScript ativo.';
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ Erro: JavaScript não está funcionando.';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Erro: ' + error.message;
            }
        }

        // Testar avatares
        function testAvatars() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div class="status">🔄 Testando avatares...</div>';
            
            const avatarUrls = [
                'minecraft-emoji-e3560/assets/minecraft/textures/font/custom/stive70.png',
                'minecraft-emoji-e3560/assets/minecraft/textures/font/custom/alex70.png',
                'minecraft-emoji-e3560/assets/minecraft/textures/font/custom/warden.png'
            ];
            
            let loadedCount = 0;
            let totalCount = avatarUrls.length;
            
            avatarUrls.forEach(url => {
                const img = new Image();
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === totalCount) {
                        resultsDiv.innerHTML = `<div class="status success">✅ Todos os ${totalCount} avatares carregaram com sucesso!</div>`;
                    }
                };
                img.onerror = () => {
                    resultsDiv.innerHTML = `<div class="status error">❌ Erro ao carregar avatar: ${url}</div>`;
                };
                img.src = url;
            });
        }

        // Testar texturas
        function testTextures() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<div class="status">🔄 Testando texturas...</div>';
            
            const textureUrls = [
                'CSS-Minecraft-main/assets/stone.png',
                'CSS-Minecraft-main/assets/oak_planks.png',
                'CSS-Minecraft-main/assets/grass_side_carried.png',
                'CSS-Minecraft-main/assets/glass.png'
            ];
            
            let loadedCount = 0;
            let totalCount = textureUrls.length;
            
            textureUrls.forEach(url => {
                const img = new Image();
                img.onload = () => {
                    loadedCount++;
                    if (loadedCount === totalCount) {
                        resultsDiv.innerHTML = `<div class="status success">✅ Todas as ${totalCount} texturas carregaram com sucesso!</div>`;
                    }
                };
                img.onerror = () => {
                    resultsDiv.innerHTML = `<div class="status error">❌ Erro ao carregar textura: ${url}</div>`;
                };
                img.src = url;
            });
        }

        // Testar JavaScript
        function testJavaScript() {
            const resultsDiv = document.getElementById('test-results');
            
            try {
                // Testar funcionalidades básicas
                const testArray = [1, 2, 3, 4, 5];
                const sum = testArray.reduce((a, b) => a + b, 0);
                
                if (sum === 15) {
                    resultsDiv.innerHTML = '<div class="status success">✅ JavaScript funcionando perfeitamente!</div>';
                } else {
                    resultsDiv.innerHTML = '<div class="status error">❌ Erro no JavaScript básico.</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">❌ Erro JavaScript: ${error.message}</div>`;
            }
        }

        // Testar LocalStorage
        function testLocalStorage() {
            const resultsDiv = document.getElementById('test-results');
            
            try {
                // Testar escrita
                localStorage.setItem('test', 'ROTINACRAFT');
                
                // Testar leitura
                const value = localStorage.getItem('test');
                
                if (value === 'ROTINACRAFT') {
                    resultsDiv.innerHTML = '<div class="status success">✅ LocalStorage funcionando perfeitamente!</div>';
                } else {
                    resultsDiv.innerHTML = '<div class="status error">❌ Erro no LocalStorage.</div>';
                }
                
                // Limpar teste
                localStorage.removeItem('test');
            } catch (error) {
                resultsDiv.innerHTML = `<div class="status error">❌ Erro LocalStorage: ${error.message}</div>`;
            }
        }

        // Inicializar quando a página carregar
        window.addEventListener('load', () => {
            checkSystemStatus();
            
            // Verificar se as imagens carregaram
            const images = document.querySelectorAll('img');
            let loadedImages = 0;
            let totalImages = images.length;
            
            images.forEach(img => {
                if (img.complete) {
                    loadedImages++;
                } else {
                    img.addEventListener('load', () => {
                        loadedImages++;
                        if (loadedImages === totalImages) {
                            console.log('✅ Todas as imagens carregaram!');
                        }
                    });
                    img.addEventListener('error', () => {
                        console.error('❌ Erro ao carregar imagem:', img.src);
                    });
                }
            });
        });

        // Log de inicialização
        console.log('🧱 ROTINACRAFT - Página de teste carregada!');
        console.log('🎮 Sistema de teste ativo');
        console.log('🔍 Verificando funcionalidades...');
    </script>
</body>
</html>
